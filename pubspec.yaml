name: scale_aware_layout
description: >-
  Keep the user's text scale and reflow layout structure (Row -> Column) to
  prevent overflow at large accessibility font sizes. The accessibility-correct
  alternative to shrinking text.
version: 0.1.0
repository: https://github.com/chicken-skip/scale_aware_layout
issue_tracker: https://github.com/chicken-skip/scale_aware_layout/issues
topics:
  - accessibility
  - layout
  - responsive
  - a11y
  - widgets

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
