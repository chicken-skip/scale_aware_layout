name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - name: Verify formatting
        run: dart format --set-exit-if-changed .
      - name: Analyze
        run: dart analyze --fatal-infos
      - name: Test
        # Golden tests are tagged `golden` and skipped here because font
        # rasterization differs across operating systems; regenerate and review
        # them locally with `flutter test --update-goldens --tags golden`.
        run: flutter test --exclude-tags golden
      - name: Publish dry-run
        run: dart pub publish --dry-run

  pana:
    runs-on: ubuntu-latest
    # Informational pub-score check; does not block the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart pub global activate pana
      - run: dart pub global run pana --no-warning --exit-code-threshold 0 .
